spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/house_of_chaos_main?createDatabaseIfNotExist=true

review.service.url=http://hoc-review:8081/api/v1/reviews
spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET}
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=false